<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 생성기</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Lucky Draw Studio</p>
      <h1>로또 번호 생성기</h1>
      <p class="lead">
        번호를 한 번에 보여주지 않고 추첨하듯 순차적으로 공개합니다.
        원하는 세트 수를 고른 뒤 버튼을 누르면 각 조합이 리듬감 있게 완성됩니다.
      </p>
    </section>

    <section class="content">
      <div class="control-panel">
        <div class="control-stack">
          <div class="field">
            <label for="setCount">생성할 세트 수</label>
            <input id="setCount" type="number" min="1" max="20" value="5">
          </div>

          <div class="quick-picks">
            <span>빠른 선택</span>
            <div class="chip-row">
              <button class="chip" type="button" data-count="1">1세트</button>
              <button class="chip" type="button" data-count="3">3세트</button>
              <button class="chip is-active" type="button" data-count="5">5세트</button>
              <button class="chip" type="button" data-count="10">10세트</button>
            </div>
          </div>
        </div>

        <div class="cta-panel">
          <p class="cta-hint">처음 시작은 이 버튼을 누르세요</p>
          <button id="generateButton" class="primary-cta" type="button">추첨 시작하기</button>
        </div>
      </div>

      <div id="results" class="results">
        <div class="empty">버튼을 눌러 로또 번호 추첨을 시작하세요.</div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
