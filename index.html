<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 생성기</title>
  <style>
    :root {
      --bg-top: #f6efe3;
      --bg-bottom: #d8e7f3;
      --panel: rgba(255, 252, 246, 0.88);
      --text: #182126;
      --muted: #5f6b73;
      --line: rgba(24, 33, 38, 0.12);
      --accent: #d84b2a;
      --accent-deep: #8f2f1b;
      --ball-1: #f6b51f;
      --ball-2: #4d88ff;
      --ball-3: #ef5f5f;
      --ball-4: #7f8b96;
      --ball-5: #57b86e;
      --shadow: 0 24px 60px rgba(33, 41, 53, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(216, 75, 42, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(77, 136, 255, 0.2), transparent 28%),
        linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(960px, 100%);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.65);
      box-shadow: var(--shadow);
      border-radius: 28px;
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    .hero {
      padding: 40px 32px 28px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.12)),
        linear-gradient(120deg, rgba(216, 75, 42, 0.08), rgba(77, 136, 255, 0.12));
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-deep);
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 0.95;
    }

    .lead {
      max-width: 620px;
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .content {
      padding: 28px 32px 32px;
      display: grid;
      gap: 24px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 10px;
    }

    .field label {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .field input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.78);
      color: var(--text);
    }

    .field input:focus {
      outline: 2px solid rgba(77, 136, 255, 0.3);
      border-color: rgba(77, 136, 255, 0.4);
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 24px;
      min-width: 176px;
      background: linear-gradient(135deg, var(--accent), #ee7a47);
      color: white;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(216, 75, 42, 0.28);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 34px rgba(216, 75, 42, 0.32);
    }

    .summary {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .results {
      display: grid;
      gap: 14px;
    }

    .set-card {
      display: grid;
      gap: 14px;
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.64);
      border: 1px solid rgba(24, 33, 38, 0.08);
      animation: rise 360ms ease both;
    }

    .set-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .set-title {
      font-weight: 800;
    }

    .set-meta {
      font-size: 0.88rem;
      color: var(--muted);
    }

    .balls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .ball {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 1rem;
      font-weight: 800;
      color: white;
      box-shadow: inset 0 -6px 14px rgba(0, 0, 0, 0.12);
    }

    .ball.group-1 { background: var(--ball-1); }
    .ball.group-2 { background: var(--ball-2); }
    .ball.group-3 { background: var(--ball-3); }
    .ball.group-4 { background: var(--ball-4); }
    .ball.group-5 { background: var(--ball-5); }

    .empty {
      padding: 28px;
      border: 1px dashed rgba(24, 33, 38, 0.18);
      border-radius: 20px;
      text-align: center;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.42);
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 700px) {
      .hero,
      .content {
        padding-left: 20px;
        padding-right: 20px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .summary,
      .set-head {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Lucky Draw Studio</p>
      <h1>로또 번호 생성기</h1>
      <p class="lead">
        1부터 45까지의 숫자 중에서 중복 없이 6개를 뽑아 정렬해 보여줍니다.
        한 번에 여러 세트도 생성할 수 있게 구성했습니다.
      </p>
    </section>

    <section class="content">
      <div class="controls">
        <div class="field">
          <label for="setCount">생성할 세트 수</label>
          <input id="setCount" type="number" min="1" max="20" value="5">
        </div>
        <button id="generateButton" type="button">번호 생성하기</button>
      </div>

      <div class="summary">
        <span>규칙: 1~45, 중복 없음, 6개 번호, 오름차순 정렬</span>
        <span id="status">기본값은 5세트입니다.</span>
      </div>

      <div id="results" class="results">
        <div class="empty">버튼을 눌러 로또 번호를 생성하세요.</div>
      </div>
    </section>
  </main>

  <script>
    const LOTTO_MIN = 1;
    const LOTTO_MAX = 45;
    const LOTTO_COUNT = 6;

    const setCountInput = document.getElementById("setCount");
    const generateButton = document.getElementById("generateButton");
    const results = document.getElementById("results");
    const status = document.getElementById("status");

    function generateNumbers() {
      const pool = Array.from(
        { length: LOTTO_MAX - LOTTO_MIN + 1 },
        (_, index) => index + LOTTO_MIN
      );

      for (let index = pool.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [pool[index], pool[randomIndex]] = [pool[randomIndex], pool[index]];
      }

      return pool.slice(0, LOTTO_COUNT).sort((a, b) => a - b);
    }

    function getBallGroup(number) {
      if (number <= 10) return "group-1";
      if (number <= 20) return "group-2";
      if (number <= 30) return "group-3";
      if (number <= 40) return "group-4";
      return "group-5";
    }

    function createSetCard(numbers, setIndex) {
      const card = document.createElement("article");
      card.className = "set-card";

      const header = document.createElement("div");
      header.className = "set-head";

      const title = document.createElement("div");
      title.className = "set-title";
      title.textContent = `${setIndex}세트`;

      const meta = document.createElement("div");
      meta.className = "set-meta";
      meta.textContent = numbers.join(" / ");

      const balls = document.createElement("div");
      balls.className = "balls";

      numbers.forEach((number) => {
        const ball = document.createElement("div");
        ball.className = `ball ${getBallGroup(number)}`;
        ball.textContent = String(number).padStart(2, "0");
        balls.appendChild(ball);
      });

      header.append(title, meta);
      card.append(header, balls);
      return card;
    }

    function renderSets() {
      const setCount = Number(setCountInput.value);

      if (!Number.isInteger(setCount) || setCount < 1 || setCount > 20) {
        status.textContent = "세트 수는 1부터 20 사이의 정수여야 합니다.";
        results.innerHTML = '<div class="empty">올바른 세트 수를 입력한 뒤 다시 시도하세요.</div>';
        return;
      }

      const fragment = document.createDocumentFragment();

      for (let setIndex = 1; setIndex <= setCount; setIndex += 1) {
        fragment.appendChild(createSetCard(generateNumbers(), setIndex));
      }

      results.innerHTML = "";
      results.appendChild(fragment);
      status.textContent = `${setCount}세트를 새로 생성했습니다.`;
    }

    generateButton.addEventListener("click", renderSets);
    renderSets();
  </script>
</body>
</html>
