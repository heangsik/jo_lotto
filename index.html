<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 생성기</title>
  <style>
    :root {
      --bg-top: #f3e8d6;
      --bg-bottom: #d8ecf6;
      --panel: rgba(255, 250, 244, 0.82);
      --panel-strong: rgba(255, 255, 255, 0.72);
      --text: #152126;
      --muted: #60707a;
      --line: rgba(21, 33, 38, 0.1);
      --accent: #d8502d;
      --accent-alt: #2e77d0;
      --accent-deep: #8b311d;
      --ball-1: #f3b321;
      --ball-2: #4688f5;
      --ball-3: #ec5b5b;
      --ball-4: #7a8790;
      --ball-5: #4eaf68;
      --shadow: 0 26px 70px rgba(37, 44, 55, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 16%, rgba(216, 80, 45, 0.18), transparent 24%),
        radial-gradient(circle at 90% 84%, rgba(70, 136, 245, 0.16), transparent 28%),
        linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(1040px, 100%);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: 30px;
      overflow: hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .hero {
      padding: 42px 34px 30px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.14)),
        linear-gradient(120deg, rgba(216, 80, 45, 0.08), rgba(46, 119, 208, 0.12));
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent-deep);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4.4rem);
      line-height: 0.94;
    }

    .lead {
      max-width: 660px;
      margin: 16px 0 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 1rem;
    }

    .content {
      padding: 28px 34px 34px;
      display: grid;
      gap: 24px;
    }

    .control-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
    }

    .control-stack {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 10px;
    }

    .field label,
    .quick-picks span,
    .insight-card .label {
      font-size: 0.92rem;
      font-weight: 800;
    }

    .field input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.78);
      color: var(--text);
    }

    .field input:focus {
      outline: 2px solid rgba(70, 136, 245, 0.28);
      border-color: rgba(70, 136, 245, 0.38);
    }

    .quick-picks {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid rgba(21, 33, 38, 0.08);
      background: rgba(255, 255, 255, 0.64);
      color: var(--text);
      box-shadow: none;
      min-width: auto;
      padding: 10px 14px;
      font-size: 0.92rem;
      font-weight: 700;
    }

    .chip.is-active {
      background: linear-gradient(135deg, rgba(46, 119, 208, 0.14), rgba(46, 119, 208, 0.22));
      border-color: rgba(46, 119, 208, 0.2);
      color: var(--accent-alt);
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 24px;
      min-width: 172px;
      background: linear-gradient(135deg, var(--accent), #ee7b49);
      color: white;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(216, 80, 45, 0.24);
      transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 34px rgba(216, 80, 45, 0.28);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
      transform: none;
      box-shadow: 0 10px 22px rgba(21, 33, 38, 0.12);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .insight-card {
      padding: 16px 18px;
      border-radius: 20px;
      background: var(--panel-strong);
      border: 1px solid rgba(21, 33, 38, 0.08);
      display: grid;
      gap: 8px;
    }

    .insight-card strong {
      font-size: 1.2rem;
    }

    .insight-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.92rem;
    }

    .results {
      display: grid;
      gap: 16px;
    }

    .set-card {
      display: grid;
      gap: 16px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(21, 33, 38, 0.08);
      animation: rise 360ms ease both;
    }

    .set-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .set-title {
      display: grid;
      gap: 4px;
    }

    .set-title strong {
      font-size: 1rem;
    }

    .set-title span,
    .draw-meta,
    .empty,
    .status-line {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .set-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .mini-button {
      min-width: auto;
      padding: 10px 14px;
      font-size: 0.88rem;
      background: linear-gradient(135deg, var(--accent-alt), #67a5f6);
      box-shadow: 0 10px 24px rgba(46, 119, 208, 0.22);
    }

    .draw-meta {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .balls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 52px;
    }

    .ball {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 1rem;
      font-weight: 800;
      color: white;
      box-shadow: inset 0 -6px 14px rgba(0, 0, 0, 0.12);
      opacity: 0;
      transform: translateY(10px) scale(0.88);
    }

    .ball.is-visible {
      animation: pop-in 420ms cubic-bezier(.21, 1.12, .56, 1) forwards;
    }

    .ball.group-1 { background: var(--ball-1); }
    .ball.group-2 { background: var(--ball-2); }
    .ball.group-3 { background: var(--ball-3); }
    .ball.group-4 { background: var(--ball-4); }
    .ball.group-5 { background: var(--ball-5); }

    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      min-height: 24px;
    }

    .number-line {
      letter-spacing: 0.03em;
      font-weight: 700;
    }

    .empty {
      padding: 28px;
      border: 1px dashed rgba(21, 33, 38, 0.18);
      border-radius: 20px;
      text-align: center;
      background: rgba(255, 255, 255, 0.42);
    }

    .status-line {
      min-height: 22px;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pop-in {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(0.82);
      }
      70% {
        opacity: 1;
        transform: translateY(-4px) scale(1.06);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 820px) {
      .control-panel,
      .summary-grid {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }

    @media (max-width: 700px) {
      .hero,
      .content {
        padding-left: 20px;
        padding-right: 20px;
      }

      .set-head,
      .meta-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .set-actions {
        width: 100%;
      }

      .mini-button {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Lucky Draw Studio</p>
      <h1>로또 번호 생성기</h1>
      <p class="lead">
        번호를 한 번에 던져 보여주지 않고, 추첨하듯 순차적으로 공개합니다.
        원하는 세트 수를 고르고 버튼을 누르면 각 조합이 리듬감 있게 완성됩니다.
      </p>
    </section>

    <section class="content">
      <div class="control-panel">
        <div class="control-stack">
          <div class="field">
            <label for="setCount">생성할 세트 수</label>
            <input id="setCount" type="number" min="1" max="20" value="5">
          </div>

          <div class="quick-picks">
            <span>빠른 선택</span>
            <div id="quickPicks" class="chip-row">
              <button class="chip" type="button" data-count="1">1세트</button>
              <button class="chip" type="button" data-count="3">3세트</button>
              <button class="chip is-active" type="button" data-count="5">5세트</button>
              <button class="chip" type="button" data-count="10">10세트</button>
            </div>
          </div>
        </div>

        <button id="generateButton" type="button">추첨 시작하기</button>
      </div>

      <div class="summary-grid">
        <article class="insight-card">
          <span class="label">생성 규칙</span>
          <strong>1~45 / 중복 없음</strong>
          <p>각 세트는 6개의 숫자를 뽑고 오름차순으로 정렬합니다.</p>
        </article>
        <article class="insight-card">
          <span class="label">현재 설정</span>
          <strong id="setPreview">5세트</strong>
          <p>빠른 선택 버튼이나 직접 입력으로 바로 바꿀 수 있습니다.</p>
        </article>
        <article class="insight-card">
          <span class="label">최근 생성</span>
          <strong id="lastDraw">아직 없음</strong>
          <p>추첨이 끝나면 마지막 실행 시간을 여기에 표시합니다.</p>
        </article>
      </div>

      <div id="status" class="status-line">기본값은 5세트입니다.</div>

      <div id="results" class="results">
        <div class="empty">버튼을 눌러 로또 번호 추첨을 시작하세요.</div>
      </div>
    </section>
  </main>

  <script>
    const LOTTO_MIN = 1;
    const LOTTO_MAX = 45;
    const LOTTO_COUNT = 6;
    const REVEAL_DELAY = 170;
    const SET_DELAY = 220;

    const setCountInput = document.getElementById("setCount");
    const generateButton = document.getElementById("generateButton");
    const results = document.getElementById("results");
    const status = document.getElementById("status");
    const setPreview = document.getElementById("setPreview");
    const lastDraw = document.getElementById("lastDraw");
    const quickPicks = Array.from(document.querySelectorAll("[data-count]"));

    let isDrawing = false;
    let runToken = 0;

    function wait(ms) {
      return new Promise((resolve) => {
        window.setTimeout(resolve, ms);
      });
    }

    function generateNumbers() {
      const pool = Array.from(
        { length: LOTTO_MAX - LOTTO_MIN + 1 },
        (_, index) => index + LOTTO_MIN
      );

      for (let index = pool.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [pool[index], pool[randomIndex]] = [pool[randomIndex], pool[index]];
      }

      return pool.slice(0, LOTTO_COUNT).sort((left, right) => left - right);
    }

    function getBallGroup(number) {
      if (number <= 10) return "group-1";
      if (number <= 20) return "group-2";
      if (number <= 30) return "group-3";
      if (number <= 40) return "group-4";
      return "group-5";
    }

    function syncQuickPicks(value) {
      quickPicks.forEach((button) => {
        button.classList.toggle("is-active", Number(button.dataset.count) === value);
      });
      setPreview.textContent = `${value}세트`;
    }

    function formatTimestamp() {
      return new Intl.DateTimeFormat("ko-KR", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      }).format(new Date());
    }

    function createSetCard(setIndex) {
      const card = document.createElement("article");
      card.className = "set-card";

      const header = document.createElement("div");
      header.className = "set-head";

      const titleWrap = document.createElement("div");
      titleWrap.className = "set-title";

      const title = document.createElement("strong");
      title.textContent = `${setIndex}세트`;

      const sub = document.createElement("span");
      sub.textContent = "번호를 순서대로 공개합니다.";

      titleWrap.append(title, sub);

      const actions = document.createElement("div");
      actions.className = "set-actions";

      const time = document.createElement("span");
      time.className = "draw-meta";
      time.textContent = "추첨 준비 중";

      const reroll = document.createElement("button");
      reroll.className = "mini-button";
      reroll.type = "button";
      reroll.textContent = "이 세트 다시";

      actions.append(time, reroll);
      header.append(titleWrap, actions);

      const balls = document.createElement("div");
      balls.className = "balls";

      const metaRow = document.createElement("div");
      metaRow.className = "meta-row";

      const line = document.createElement("div");
      line.className = "number-line";
      line.textContent = "추첨 중...";

      const state = document.createElement("div");
      state.className = "draw-meta";
      state.textContent = "0 / 6 공개";

      metaRow.append(line, state);
      card.append(header, balls, metaRow);

      return { card, balls, line, state, time, reroll, sub };
    }

    async function revealSet(setCard, numbers, token) {
      setCard.balls.innerHTML = "";
      setCard.line.textContent = "추첨 중...";
      setCard.state.textContent = "0 / 6 공개";
      setCard.time.textContent = "추첨 진행 중";
      setCard.sub.textContent = "숫자가 하나씩 공개됩니다.";

      for (let index = 0; index < numbers.length; index += 1) {
        if (token !== runToken) {
          return false;
        }

        const number = numbers[index];
        const ball = document.createElement("div");
        ball.className = `ball ${getBallGroup(number)}`;
        ball.textContent = String(number).padStart(2, "0");
        setCard.balls.appendChild(ball);

        await wait(20);
        ball.classList.add("is-visible");

        const shownNumbers = numbers
          .slice(0, index + 1)
          .map((value) => String(value).padStart(2, "0"))
          .join(" / ");

        setCard.line.textContent = shownNumbers;
        setCard.state.textContent = `${index + 1} / 6 공개`;

        await wait(REVEAL_DELAY);
      }

      setCard.time.textContent = formatTimestamp();
      setCard.sub.textContent = "추첨 완료. 원하는 경우 이 세트만 다시 생성할 수 있습니다.";
      return true;
    }

    async function rerollSingleSet(setCard) {
      if (isDrawing) {
        status.textContent = "전체 추첨 중에는 개별 재추첨을 잠시 기다려주세요.";
        return;
      }

      isDrawing = true;
      generateButton.disabled = true;
      runToken += 1;
      const token = runToken;
      setCard.reroll.disabled = true;
      status.textContent = "선택한 세트를 다시 추첨하고 있습니다.";

      await revealSet(setCard, generateNumbers(), token);

      setCard.reroll.disabled = false;
      generateButton.disabled = false;
      isDrawing = false;
      lastDraw.textContent = formatTimestamp();
      status.textContent = "선택한 세트를 새 번호로 갱신했습니다.";
    }

    function validateSetCount() {
      const value = Number(setCountInput.value);
      if (!Number.isInteger(value) || value < 1 || value > 20) {
        return null;
      }
      return value;
    }

    async function renderSets() {
      const setCount = validateSetCount();

      if (setCount === null) {
        status.textContent = "세트 수는 1부터 20 사이의 정수여야 합니다.";
        results.innerHTML = '<div class="empty">올바른 세트 수를 입력한 뒤 다시 시도하세요.</div>';
        return;
      }

      isDrawing = true;
      runToken += 1;
      const token = runToken;
      generateButton.disabled = true;
      syncQuickPicks(setCount);
      status.textContent = `${setCount}세트 추첨을 시작합니다.`;

      results.innerHTML = "";
      const setCards = [];

      for (let setIndex = 1; setIndex <= setCount; setIndex += 1) {
        const setCard = createSetCard(setIndex);
        setCard.reroll.addEventListener("click", () => {
          rerollSingleSet(setCard);
        });
        setCard.reroll.disabled = true;
        setCards.push(setCard);
        results.appendChild(setCard.card);
      }

      for (let index = 0; index < setCards.length; index += 1) {
        if (token !== runToken) {
          return;
        }

        status.textContent = `${index + 1}번째 세트를 추첨 중입니다.`;
        const completed = await revealSet(setCards[index], generateNumbers(), token);

        if (!completed) {
          return;
        }

        setCards[index].reroll.disabled = false;
        await wait(SET_DELAY);
      }

      generateButton.disabled = false;
      isDrawing = false;
      lastDraw.textContent = formatTimestamp();
      status.textContent = `${setCount}세트 추첨이 완료됐습니다. 원하는 세트만 다시 생성할 수도 있습니다.`;
    }

    quickPicks.forEach((button) => {
      button.addEventListener("click", () => {
        const value = Number(button.dataset.count);
        setCountInput.value = value;
        syncQuickPicks(value);
        status.textContent = `${value}세트로 설정했습니다. 추첨을 시작할 수 있습니다.`;
      });
    });

    setCountInput.addEventListener("input", () => {
      const value = Number(setCountInput.value);
      if (Number.isInteger(value) && value >= 1 && value <= 20) {
        syncQuickPicks(value);
      }
    });

    generateButton.addEventListener("click", renderSets);
    syncQuickPicks(Number(setCountInput.value));
    renderSets();
  </script>
</body>
</html>
